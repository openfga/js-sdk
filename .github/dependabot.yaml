# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json
version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /example/api-executor
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /example/example1
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /example/opentelemetry
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /example/streamed-list-objects
    schedule:
      interval: weekly
